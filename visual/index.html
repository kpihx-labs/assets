<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>KpihX Labs | Visual Experience</title>
    <style>
        body { margin: 0; background: #1e1e1e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        .overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #007acc;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .back {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #d4d4d4;
            text-decoration: none;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 5px;
            border: 1px solid #007acc;
        }
    </style>
</head>
<body>
    <div class="overlay">Sovereign Visual Engine v1.0</div>
    <a href="/" class="back">Retour au Hub</a>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Grid
        const grid = new THREE.GridHelper(100, 100, 0x007acc, 0x333333);
        grid.position.y = -5;
        scene.add(grid);

        // Central Orb (Wireframe)
        const geometry = new THREE.IcosahedronGeometry(3, 2);
        const material = new THREE.MeshBasicMaterial({ color: 0x007acc, wireframe: true, transparent: true, opacity: 0.8 });
        const sphere = new THREE.Mesh(geometry, material);
        scene.add(sphere);

        // Particles
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 1000;
        const posArray = new Float32Array(particlesCount * 3);
        for(let i=0; i<particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 50;
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMaterial = new THREE.PointsMaterial({ size: 0.05, color: 0xffffff });
        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        camera.position.z = 10;
        camera.position.y = 2;

        function animate() {
            requestAnimationFrame(animate);
            sphere.rotation.y += 0.005;
            sphere.rotation.x += 0.002;
            particlesMesh.rotation.y += 0.001;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
