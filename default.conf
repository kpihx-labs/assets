server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # --- Standard Aliases ---
    
    # --- ScienCurious Lab Endpoints ---
    
    location = /sciencurious/ {
        return 301 /#/sciencurious_lab/README;
    }

    location = /sciencurious/logo {
        alias /usr/share/nginx/html/sciencurious_lab/logo.png;
    }

    location = /sciencurious/presentation {
        return 301 /#/sciencurious_lab/presentation;
    }

    location = /sciencurious/visual {
        alias /usr/share/nginx/html/sciencurious_lab/visual.png;
    }

    # --- Docsify SPA Support ---

    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- MIME types and caching ---
    include /etc/nginx/mime.types;
    
    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|eot|ttf|otf|ttc|otf)$ {
        expires 30d;
        add_header Cache-Control "public";
    }
}
