server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # --- Standard Aliases ---
    
    # ScienCurious Shortlinks
    location = /sciencurious/logo {
        alias /usr/share/nginx/html/sciencurious_lab/sciencurious_lab.png;
    }

    location = /sciencurious/presentation {
        # Redirect to Docsify path for better rendering
        return 301 /#/sciencurious_lab/presentation;
    }

    # Standard /visual endpoint
    location /visual {
        alias /usr/share/nginx/html/visual/;
        index index.html;
    }

    # --- Docsify SPA Support ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- MIME types and caching ---
    include /etc/nginx/mime.types;
    
    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|eot|ttf|otf|ttc|otf)$ {
        expires 30d;
        add_header Cache-Control "public";
    }
}
