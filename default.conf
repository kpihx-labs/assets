server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # --- Standard Aliases ---
    
    # --- ScienCurious Lab Endpoints ---
    
    # Direct Assets (Regex prioritized)
    location ~* ^/sciencurious/(logo|visual)$ {
        root /usr/share/nginx/html;
        rewrite ^/sciencurious/(.*)$ /sciencurious_lab/$1.png break;
        add_header Content-Type image/png;
    }

    location ~* ^/sciencurious/(.*\.png)$ {
        root /usr/share/nginx/html;
        rewrite ^/sciencurious/(.*)$ /sciencurious_lab/$1 break;
        add_header Content-Type image/png;
    }

    # Redirects for Docsify Pages
    location = /sciencurious/ {
        return 301 /#/sciencurious_lab/README;
    }

    location = /sciencurious/presentation {
        return 301 /#/sciencurious_lab/presentation;
    }

    # --- Docsify SPA Support ---


    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- MIME types and caching ---
    include /etc/nginx/mime.types;
    
    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|eot|ttf|otf|ttc|otf)$ {
        expires 30d;
        add_header Cache-Control "public";
    }
}
