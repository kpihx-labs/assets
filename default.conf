server {
    listen 80;
    server_name assets.kpihx-labs.com assets.homelab localhost;

    root /usr/share/nginx/html;
    index index.html;

    # --- ScienCurious Lab (Project Agnostic Routing) ---
    
    # 1. Shortlinks for branded assets (No extension)
    location = /sciencurious/logo {
        alias /usr/share/nginx/html/sciencurious_lab/logo.png;
        add_header Content-Type image/png;
        add_header X-Asset-Mode "Shortlink" always;
    }

    location = /sciencurious/visual {
        alias /usr/share/nginx/html/sciencurious_lab/visual.png;
        add_header Content-Type image/png;
        add_header X-Asset-Mode "Shortlink" always;
    }

    # 2. Redirects for Docsify SPA structure
    location ~* ^/sciencurious/?$ {
        return 301 /#/sciencurious_lab/README;
    }

    location ~* ^/sciencurious/presentation/?$ {
        return 301 /#/sciencurious_lab/presentation;
    }

    # 3. General static file serving (for .png, .md, etc.)
    location /sciencurious_lab/ {
        autoindex on;
    }

    # 4. Global SPA Fallback (Docsify)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- MIME types and caching ---
    include /etc/nginx/mime.types;
    
    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|eot|ttf|otf|ttc|otf)$ {
        expires 30d;
        add_header Cache-Control "public";
    }
}
