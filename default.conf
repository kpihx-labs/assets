server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # --- Standard Aliases ---
    
    # --- ScienCurious Lab Endpoints ---
    
    # --- ScienCurious Lab Endpoints ---
    
    # Direct Assets (Named captures + try_files)
    location ~* ^/sciencurious/(?<asset>logo|visual)$ {
        add_header Content-Type image/png;
        try_files /sciencurious_lab/$asset.png =404;
    }

    location ~* ^/sciencurious/(?<file>.*\.png)$ {
        add_header Content-Type image/png;
        try_files /sciencurious_lab/$file =404;
    }

    # Redirects for Docsify Pages (Case-insensitive)
    location ~* ^/sciencurious/?$ {
        return 301 /#/sciencurious_lab/README;
    }

    location ~* ^/sciencurious/presentation/?$ {
        return 301 /#/sciencurious_lab/presentation;
    }

    # --- Docsify SPA Support ---


    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- MIME types and caching ---
    include /etc/nginx/mime.types;
    
    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|eot|ttf|otf|ttc|otf)$ {
        expires 30d;
        add_header Cache-Control "public";
    }
}
