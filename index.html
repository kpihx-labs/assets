<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>KpihX Labs | Assets Hub v1.1.1</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Sovereign Assets Hub for KpihX-Labs - Sovereign Cloud Journey">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css" title="docsify-darklight-theme" type="text/css" />
  <style>
    /* --- VS CODE STYLE UI (KpihX Standard) --- */
    .sidebar {
      display: flex !important;
      flex-direction: column !important;
      background-color: var(--sidebar-background) !important;
    }
    .app-name {
      order: 1 !important;
      margin-top: 20px !important;
      font-weight: bold !important;
      font-size: 1.2rem !important;
      text-align: center;
    }
    .search {
      order: 2 !important;
      margin-bottom: 20px !important;
    }
    .sidebar-nav {
      order: 3 !important;
      flex: 1 !important;
    }
    #docsify-darklight-theme {
      top: 15px !important;
      right: 15px !important;
    }
    .search input {
      background-color: var(--codeBackgroundColor) !important;
      border: 1px solid var(--borderColor) !important;
      color: var(--textColor) !important;
    }
  </style>
</head>
<body>
  <div id="app">Chargement du Sovereign Hub...</div>
  <script>
    window.$docsify = {
      name: 'KpihX-Labs Assets',
      repo: 'https://github.com/kpihx-labs/assets',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      themeColor: '#007acc',
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '🔍 Rechercher un asset...',
        noData: '❌ Aucun asset trouvé.',
        depth: 6
      },
      darklightTheme: {
        siteFont : "Segoe UI, Tahoma, Geneva, Verdana, sans-serif",
        defaultTheme : 'dark',
        dark: {
          accent: '#007acc',
          background: '#1e1e1e',
          sidebarBackground: '#252526',
          textColor: '#d4d4d4'
        }
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
</body>
</html>
