version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: kpihx-labs-assets
    restart: unless-stopped
    volumes:
      - .:/usr/share/nginx/html:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kpihx-labs-assets.rule=Host(`assets.kpihx-labs.com`) || Host(`assets.pve`)"
      - "traefik.http.routers.kpihx-labs-assets.entrypoints=websecure"
      - "traefik.http.routers.kpihx-labs-assets.tls=true"
      - "traefik.http.services.kpihx-labs-assets.loadbalancer.server.port=80"
    networks:
      - cloudflare-tunnel

networks:
  cloudflare-tunnel:
    external: true
